services:
  cpanel:
    image: almalinux:8
    container_name: devcp
    hostname: devcp.perciocastelo.com.br
    privileged: true
    restart: unless-stopped
    networks:
      - cpanel-network
    
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RAWIO
    
    command: >
      /bin/bash -c "
      mkdir -p /etc /var/lib/dhcpd /var/log/cpanel-install /var/lib/rpm && 
      touch /etc/fstab /var/lib/dhcpd/dhcpd.leases /var/lib/rpm/.rpm.lock &&
      dnf install -y openssh-server passwd systemd iptables-services network-scripts wget perl hostname sudo curl tar gzip &&
      echo root:devcp2026 | chpasswd &&
      echo PermitRootLogin yes >> /etc/ssh/sshd_config &&
      if [ ! -f /usr/local/cpanel/cpsrvd ]; then
        cd /home && curl -o latest -L https://securedownloads.cpanel.net/latest &&
        sh latest --force --skip-all-imunify --skip-wptoolkit --skip-systemd 2>&1 | tee /var/log/cpanel-install.log
      fi &&
      /usr/local/cpanel/cpsrvd
      "
    
    stop_signal: SIGRTMIN+3
    
    ports:
      - "22028:22"
      - "2083:2083"
      - "2082:2082"
      - "2087:2087"
      - "2086:2086"
      - "8091:80"
      - "8447:443"
    
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - cpanel_home:/home/cpanel
      - cpanel_etc:/etc
      - cpanel_var:/var
      - cpanel_usr:/usr/local/cpanel
      - cpanel_logs:/var/log
      - cpanel_opt:/opt
      - /lib/modules:/lib/modules:ro
    
    environment:
      - LANG=C.utf8
      - TZ=America/Sao_Paulo
      - container=docker
      - PHP_INI=production

    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:2083/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  cpanel-network:
    driver: bridge

volumes:
  cpanel_home:
  cpanel_etc:
  cpanel_var:
  cpanel_usr:
  cpanel_logs:
  cpanel_opt:
