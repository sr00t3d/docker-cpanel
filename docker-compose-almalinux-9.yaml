services:
  almalinux9-cpanel:
    image: almalinux:9
    container_name: ${CONTAINER_NAME}
    hostname: ${HOSTNAME}
    privileged: true
    restart: always
    tty: true
    stdin_open: true
    
    # CRÍTICO: Permite que o systemd veja a hierarquia de cgroup real do host
    # Se sua versão do compose for antiga e der erro aqui, remova esta linha
    # e use a flag --cgroupns=host no comando docker run manual.
    cgroup: host

    security_opt:
      - label:disable
      - seccomp:unconfined
    
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RAWIO
    
    command: 
      - /bin/bash
      - -c
      - |
        if [ ! -f /etc/firstboot_done ]; then
          echo "Provisionando AlmaLinux 9...";
          mkdir -p /etc && touch /etc/fstab;
          dnf install -y openssh-server passwd systemd iptables-services wget perl hostname rsyslog;
          echo "root:${ROOT_PASSWORD}" | chpasswd;
          echo "Port ${SSH_PORT_CONTAINER}" >> /etc/ssh/sshd_config;
          sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config;
          systemctl enable rsyslog sshd;
          touch /etc/firstboot_done;
        fi;
        echo "Iniciando Systemd v252...";
        exec /usr/lib/systemd/systemd --log-level=info --unit=multi-user.target;

    stop_signal: SIGRTMIN+3
    
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    
    ports:
      - "${SSH_PORT_HOST}:${SSH_PORT_CONTAINER}"
      - "${CPANEL_SSL_PORT}:${CPANEL_SSL_PORT}"
      - "${WHM_SSL_PORT}:${WHM_SSL_PORT}"
      - "${CPANEL_NON_SSL_PORT}:${CPANEL_NON_SSL_PORT}"
      - "${WHM_NON_SSL_PORT}:${WHM_NON_SSL_PORT}"
      - "${HTTP_PORT_HOST}:${HTTP_PORT_CONTAINER}"
      - "${HTTPS_PORT_HOST}:${HTTPS_PORT_CONTAINER}"
    
    volumes:
      # No Cgroup v2, montamos a raiz como RW
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /lib/modules:/lib/modules:ro
      - cpanel_home:/home
      - cpanel_etc:/etc
      - cpanel_var:/var
      - cpanel_usr:/usr
      - cpanel_logs:/var/log
      - cpanel_core:/usr/local/cpanel

    environment:
      - LANG=${LANG}
      - TZ=${TIMEZONE}
      - ROOT_PASSWORD=${ROOT_PASSWORD}
      - container=docker

volumes:
  cpanel_home: {}
  cpanel_etc: {}
  cpanel_var: {}
  cpanel_usr: {}
  cpanel_logs: {}
  cpanel_core: {}
